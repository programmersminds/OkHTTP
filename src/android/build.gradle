apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
    namespace 'com.securehttp'
    compileSdkVersion 34

    defaultConfig {
        minSdkVersion 24          // 16KB page size support requires API 24+
        targetSdkVersion 34

        ndk {
            // Only ship ABIs that support 16KB pages.
            // x86 / x86_64 are emulator-only and do not need 16KB alignment.
            abiFilters "arm64-v8a", "x86_64"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    // Ensure the packaged .so files are NOT compressed in the APK/AAB.
    // Compressed .so files cannot be loaded with 16KB page alignment.
    packagingOptions {
        jniLibs {
            useLegacyPackaging = false   // store .so uncompressed (extractNativeLibs=false)
        }
    }
}

dependencies {
    implementation 'com.facebook.react:react-native:+'
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
    implementation 'com.google.android.gms:play-services-base:18.3.0'
}
