apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
    namespace 'com.securehttp'
    compileSdkVersion 34

    defaultConfig {
        minSdkVersion 24          // 16KB page size support requires API 24+
        targetSdkVersion 34

        // ---------------------------------------------------------------
        // 16KB page alignment — required by Google Play from 2025 onwards
        // for devices running Android 15+ (API 35).
        // This tells the linker to align ELF load segments to 16KB so the
        // .so can be loaded on kernels that use 16KB memory pages.
        // ---------------------------------------------------------------
        externalNativeBuild {
            cmake {
                arguments "-DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON"
                // 16KB page alignment must be a linker flag, not a compiler flag
                ldFlags  "-Wl,-z,max-page-size=16384"
            }
        }

        ndk {
            // Only ship ABIs that support 16KB pages.
            // x86 / x86_64 are emulator-only and do not need 16KB alignment.
            abiFilters "arm64-v8a", "x86_64"
        }
    }

    // Point to the CMakeLists that builds / links the Rust .so
    externalNativeBuild {
        cmake {
            path   "CMakeLists.txt"
            version "3.22.1"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    // Ensure the packaged .so files are NOT compressed in the APK/AAB.
    // Compressed .so files cannot be loaded with 16KB page alignment.
    packagingOptions {
        jniLibs {
            useLegacyPackaging = false   // store .so uncompressed (extractNativeLibs=false)
        }
    }
}

dependencies {
    implementation 'com.facebook.react:react-native:+'
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
    implementation 'org.conscrypt:conscrypt-android:2.5.2'
    implementation 'com.google.android.gms:play-services-base:18.3.0'
}
